<!-- PROJECT: finder -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finder</title>
    <!-- Sentry Error Monitoring -->
    <script>
      window.sentryOnLoad = function () {
        Sentry.init({
          environment: 'desktop',
          sampleRate: 1.0,
          ignoreErrors: [
            'ResizeObserver loop',
            'Non-Error promise rejection captured',
            'Network request failed',
            /Failed to fetch/
          ],
          beforeSend: function(event) {
            var key = (event.exception && event.exception.values && event.exception.values[0])
                      ? event.exception.values[0].type + ':' + event.exception.values[0].value
                      : 'unknown';
            if (!window._sentryRateMap) window._sentryRateMap = {};
            var now = Date.now();
            if (!window._sentryRateMap[key]) window._sentryRateMap[key] = [];
            window._sentryRateMap[key].push(now);
            window._sentryRateMap[key] = window._sentryRateMap[key].filter(function(t) { return now - t < 60000; });
            if (window._sentryRateMap[key].length > 5) return null;
            return event;
          }
        });
        Sentry.setTag('app', 'finder');
      };
    </script>
    <script
      src="https://js.sentry-cdn.com/2c7e0e3b1026d137b7720e90f18001a4.min.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div id="breadcrumb"></div>
    <div id="main-area">
        <div id="sidebar"></div>
        <div id="sidebar-resizer"></div>
        <div id="columns"></div>
    </div>
    <div id="context-menu" class="context-menu" style="display:none;">
        <div class="ctx-item" data-action="open">열기</div>
        <div class="ctx-separator"></div>
        <div class="ctx-item" data-action="copy">복사<span class="ctx-shortcut">Ctrl+C</span></div>
        <div class="ctx-item" data-action="cut">잘라내기<span class="ctx-shortcut">Ctrl+X</span></div>
        <div class="ctx-item" data-action="paste">붙여넣기<span class="ctx-shortcut">Ctrl+V</span></div>
        <div class="ctx-separator"></div>
        <div class="ctx-item" data-action="rename">이름 변경</div>
        <div class="ctx-item" data-action="delete">삭제<span class="ctx-shortcut">Del</span></div>
        <div class="ctx-separator"></div>
        <div class="ctx-item" data-action="newFolder">새 폴더<span class="ctx-shortcut">Ctrl+Shift+N</span></div>
    </div>
    <div id="sidebar-context-menu" class="context-menu" style="display:none;">
        <div class="ctx-item" data-action="sidebar-rename">이름 변경</div>
        <div class="ctx-separator"></div>
        <div class="ctx-item" data-action="sidebar-remove">즐겨찾기 제거</div>
    </div>
    <div id="statusbar">준비</div>
    <script src="app.js?v=2"></script>
</body>
</html>
